name: yuva_classes
description: "Yuva Classes - Production User App"
publish_to: 'none'
version: 2.4.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  smooth_page_indicator: ^1.2.0+3
  supabase_flutter: ^2.8.0
  shared_preferences: ^2.5.1
  google_sign_in: ^6.2.1
  flutter_dotenv: ^5.2.1
  pinput: ^6.0.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  razorpay_flutter: ^1.3.7
  url_launcher: ^6.3.1
  webview_flutter: any
  screen_security: ^1.0.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logos/
    - assets/images/onboarding/
    - .env
